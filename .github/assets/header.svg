<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }

      /* ── Scenario 1 groups (interactive -a -p) ── */
      .s1a { animation: s1a 20s infinite; }
      .s1b { animation: s1b 20s infinite; }
      .s1c { animation: s1c 20s infinite; }
      .s1d { animation: s1d 20s infinite; }
      .s1e { animation: s1e 20s infinite; }
      .s1f { animation: s1f 20s infinite; }

      /* ── Scenario 2 groups (direct flags) ── */
      .s2a { animation: s2a 20s infinite; }
      .s2b { animation: s2b 20s infinite; }
      .s2c { animation: s2c 20s infinite; }

      .cur { animation: blink 1s infinite; }

      /* s1: visible from ~0.5s, all fade at 8.8-9.6s (44-48%) */
      @keyframes s1a { 0%,2%{opacity:0}  4%{opacity:1}  44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
      @keyframes s1b { 0%,6%{opacity:0}  8%{opacity:1}  44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
      @keyframes s1c { 0%,13%{opacity:0} 15%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
      @keyframes s1d { 0%,20%{opacity:0} 22%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
      @keyframes s1e { 0%,27%{opacity:0} 29%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
      @keyframes s1f { 0%,33%{opacity:0} 35%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }

      /* s2: visible from ~10.8s (54%), all fade at 18-18.8s (90-94%) */
      @keyframes s2a { 0%,54%{opacity:0} 56%{opacity:1} 90%{opacity:1} 94%{opacity:0} 100%{opacity:0} }
      @keyframes s2b { 0%,61%{opacity:0} 63%{opacity:1} 90%{opacity:1} 94%{opacity:0} 100%{opacity:0} }
      @keyframes s2c { 0%,67%{opacity:0} 69%{opacity:1} 90%{opacity:1} 94%{opacity:0} 100%{opacity:0} }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- shadow -->
  <rect x="4" y="6" width="720" height="420" rx="12" fill="#000" opacity="0.35"/>

  <!-- terminal background -->
  <rect width="720" height="420" rx="12" fill="#1e1e2e"/>

  <!-- titlebar -->
  <rect width="720" height="38" rx="12" fill="#313244"/>
  <rect y="28" width="720" height="10" fill="#313244"/>

  <!-- traffic lights -->
  <circle cx="24" cy="19" r="7" fill="#ff5f57"/>
  <circle cx="46" cy="19" r="7" fill="#ffbd2e"/>
  <circle cx="68" cy="19" r="7" fill="#28ca41"/>

  <!-- titlebar label: scenario 1 -->
  <g class="s1a">
    <text x="360" y="24" text-anchor="middle" font-size="12" fill="#6c7086">interactive mode — ~/myproject</text>
  </g>
  <!-- titlebar label: scenario 2 -->
  <g class="s2a">
    <text x="360" y="24" text-anchor="middle" font-size="12" fill="#6c7086">direct flags — ~/myproject</text>
  </g>

  <!-- ══════════════════════ SCENARIO 1: convcommit -a -p ══════════════════════ -->

  <!-- S1A · command line -->
  <g class="s1a">
    <text y="66" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">❯</tspan>
      <tspan fill="#cdd6f4"> convcommit </tspan>
      <tspan fill="#89b4fa">-a -p</tspan>
    </text>
  </g>

  <!-- S1B · type selector grid
       col start x: 20 | 137 | 254 | 371  (15 chars × ~7.8px ≈ 117px) -->
  <g class="s1b">
    <text x="20" y="87" font-size="11" fill="#45475a">── Select commit TYPE ──────────────────────────────────────────────</text>
    <!-- row 1: build ★chore docs deps -->
    <text y="108" font-size="13">
      <tspan x="20"  fill="#45475a"> [</tspan><tspan fill="#89b4fa">B</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> build    </tspan>
      <tspan x="137" fill="#f9e2af">★[</tspan><tspan fill="#89b4fa">C</tspan><tspan fill="#f9e2af">]</tspan><tspan fill="#f9e2af"> chore    </tspan>
      <tspan x="254" fill="#45475a"> [</tspan><tspan fill="#89b4fa">D</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> docs     </tspan>
      <tspan x="371" fill="#45475a"> [</tspan><tspan fill="#89b4fa">E</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> deps     </tspan>
    </text>
    <!-- row 2: feat fix ci init -->
    <text y="128" font-size="13">
      <tspan x="20"  fill="#45475a"> [</tspan><tspan fill="#89b4fa">F</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> feat     </tspan>
      <tspan x="137" fill="#45475a"> [</tspan><tspan fill="#89b4fa">G</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> fix      </tspan>
      <tspan x="254" fill="#45475a"> [</tspan><tspan fill="#89b4fa">H</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> ci       </tspan>
      <tspan x="371" fill="#45475a"> [</tspan><tspan fill="#89b4fa">I</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> init     </tspan>
    </text>
    <!-- row 3: merge perf refactor revert -->
    <text y="148" font-size="13">
      <tspan x="20"  fill="#45475a"> [</tspan><tspan fill="#89b4fa">J</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> merge    </tspan>
      <tspan x="137" fill="#45475a"> [</tspan><tspan fill="#89b4fa">K</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> perf     </tspan>
      <tspan x="254" fill="#45475a"> [</tspan><tspan fill="#89b4fa">L</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> refactor </tspan>
      <tspan x="371" fill="#45475a"> [</tspan><tspan fill="#89b4fa">M</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> revert   </tspan>
    </text>
    <!-- row 4: security style test wip -->
    <text y="168" font-size="13">
      <tspan x="20"  fill="#45475a"> [</tspan><tspan fill="#89b4fa">N</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> security </tspan>
      <tspan x="137" fill="#45475a"> [</tspan><tspan fill="#89b4fa">O</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> style    </tspan>
      <tspan x="254" fill="#45475a"> [</tspan><tspan fill="#89b4fa">P</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> test     </tspan>
      <tspan x="371" fill="#45475a"> [</tspan><tspan fill="#89b4fa">W</tspan><tspan fill="#45475a">]</tspan><tspan fill="#cdd6f4"> wip      </tspan>
    </text>
    <!-- free text -->
    <text y="188" font-size="13">
      <tspan x="20" fill="#45475a"> [</tspan><tspan fill="#cba6f7">.</tspan><tspan fill="#45475a">]</tspan>
      <tspan fill="#585b70"> free text</tspan>
    </text>
  </g>

  <!-- S1C · type selected -->
  <g class="s1c">
    <text y="210" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">✓</tspan>
      <tspan fill="#89b4fa"> type  </tspan>
      <tspan fill="#a6e3a1" font-weight="bold">feat</tspan>
    </text>
  </g>

  <!-- S1D · scope + message inputs -->
  <g class="s1d">
    <text x="20" y="232" font-size="11" fill="#45475a">── Select commit SCOPE ─────────────────────────────────────────────</text>
    <text y="252" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">✓</tspan>
      <tspan fill="#89b4fa"> scope  </tspan>
      <tspan fill="#a6e3a1" font-weight="bold">api</tspan>
    </text>
    <text x="20" y="274" font-size="11" fill="#45475a">── Commit MESSAGE ──────────────────────────────────────────────────</text>
    <text y="294" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">✓</tspan>
      <tspan fill="#89b4fa"> message  </tspan>
      <tspan fill="#a6e3a1" font-weight="bold">add new authentication endpoint</tspan>
    </text>
  </g>

  <!-- S1E · commit + push result -->
  <g class="s1e">
    <line x1="20" y1="310" x2="700" y2="310" stroke="#313244" stroke-width="1"/>
    <text y="330" font-size="13">
      <tspan x="20" fill="#45475a">[main </tspan><tspan fill="#cba6f7">7a2b3c9</tspan><tspan fill="#45475a">] </tspan>
      <tspan fill="#a6e3a1">feat</tspan><tspan fill="#45475a">(</tspan><tspan fill="#89b4fa">api</tspan><tspan fill="#45475a">): </tspan>
      <tspan fill="#cdd6f4">add new authentication endpoint</tspan>
    </text>
    <text y="350" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">✓</tspan>
      <tspan fill="#585b70"> pushed to </tspan>
      <tspan fill="#cba6f7">origin/main</tspan>
    </text>
  </g>

  <!-- S1F · idle prompt -->
  <g class="s1f">
    <text y="374" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">❯</tspan>
      <tspan fill="#cdd6f4"> </tspan><tspan class="cur" fill="#cdd6f4">█</tspan>
    </text>
  </g>

  <!-- ═══════════════════ SCENARIO 2: convcommit --add … -t -s -m -p ═══════════════════ -->

  <!-- S2A · direct flags command + label -->
  <g class="s2a">
    <text y="66" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">❯</tspan>
      <tspan fill="#cdd6f4"> convcommit </tspan>
      <tspan fill="#89b4fa">--add</tspan>
      <tspan fill="#cdd6f4"> src/auth.sh </tspan>
      <tspan fill="#45475a">\</tspan>
    </text>
    <text y="87" font-size="13">
      <tspan x="36" fill="#89b4fa">-t</tspan><tspan fill="#cdd6f4"> fix </tspan>
      <tspan fill="#89b4fa">-s</tspan><tspan fill="#cdd6f4"> auth </tspan>
      <tspan fill="#89b4fa">-m</tspan><tspan fill="#cdd6f4"> </tspan>
      <tspan fill="#f9e2af">"fix null pointer in login"</tspan>
      <tspan fill="#cdd6f4"> </tspan>
      <tspan fill="#89b4fa">-p</tspan>
    </text>
    <text x="20" y="115" font-size="11" fill="#45475a">── no selector, no manual staging ──────────────────────────────────</text>
  </g>

  <!-- S2B · commit result -->
  <g class="s2b">
    <text y="138" font-size="13">
      <tspan x="20" fill="#45475a">[main </tspan><tspan fill="#cba6f7">d5f3a91</tspan><tspan fill="#45475a">] </tspan>
      <tspan fill="#f38ba8">fix</tspan><tspan fill="#45475a">(</tspan><tspan fill="#89b4fa">auth</tspan><tspan fill="#45475a">): </tspan>
      <tspan fill="#cdd6f4">fix null pointer in login</tspan>
    </text>
  </g>

  <!-- S2C · push + idle prompt -->
  <g class="s2c">
    <text y="160" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">✓</tspan>
      <tspan fill="#585b70"> pushed to </tspan>
      <tspan fill="#cba6f7">origin/main</tspan>
    </text>
    <text y="182" font-size="13">
      <tspan x="20" fill="#585b70">Done in </tspan>
      <tspan fill="#f9e2af">0.8s</tspan>
    </text>
    <text y="208" font-size="13">
      <tspan x="20" fill="#a6e3a1" filter="url(#glow)">❯</tspan>
      <tspan fill="#cdd6f4"> </tspan><tspan class="cur" fill="#cdd6f4">█</tspan>
    </text>
  </g>

  <!-- border glow -->
  <rect width="720" height="420" rx="12" fill="none" stroke="#89b4fa" stroke-width="0.5" opacity="0.2"/>
</svg>
